name: CI

on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**", "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & unit tests (Bun)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # lets GITHUB_TOKEN read @lana-care/* from GitHub Packages
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          # .npmrc references ${GITHUB_PACKAGES_TOKEN} for the @lana-care scope.
          # Requires the @lana-care/* packages to grant this repo read access
          # (package settings → Manage Actions access), or an org read:packages PAT.
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Unit tests
        run: bunx vitest run --passWithNoTests

      - name: Build
        run: bun run build
