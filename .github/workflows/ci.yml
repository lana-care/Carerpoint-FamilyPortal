name: CI

on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**", "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & unit tests (Bun)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # lets GITHUB_TOKEN read @lana-care/* from GitHub Packages
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          # .npmrc references ${GITHUB_PACKAGES_TOKEN} for the @lana-care scope.
          # The automatic GITHUB_TOKEN cannot read @lana-care/* from GitHub
          # Packages — a cross-repo package read needs an explicit grant — so
          # every run died at install with a 403. LANA_PACKAGES_TOKEN is a PAT
          # that can read the scope; the fallback keeps forks from erroring on
          # a missing secret (they still cannot resolve the packages).
          GITHUB_PACKAGES_TOKEN: ${{ secrets.LANA_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Unit tests
        run: bunx vitest run --passWithNoTests

      - name: Build
        run: bun run build
